apiVersion: kubocd.kubotal.io/v1alpha1
kind: Release
metadata:
  name: dns-server
  namespace: kubocd-system
spec:
  description: "DNS Server - Lightweight DNS server for local development"
  createNamespace: true
  package:
    interval: 30m
    repository: quay.io/kubotal/packages-dev/dns-server
    tag: 1.0.0-p03
    timeout: 10m
  contexts:
    - name: default
      namespace: kubocd-system
  targetNamespace: dns-server
  parameters:
    target: 127.0.0.1
    nodePort: 30053
