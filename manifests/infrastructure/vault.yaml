apiVersion: kubocd.kubotal.io/v1alpha1
kind: Release
metadata:
  name: vault
  namespace: kubocd-system
spec:
  description: "Hashicorp Vault for secrets management"
  # Vault exposes an Ingress; wait for ingress-nginx (role `ingress`) so its
  # admission webhook is up before the Ingress is created (avoids the
  # "validate.nginx.ingress.kubernetes.io: connection refused" install race).
  dependencies:
    - ingress
  package:
    repository: quay.io/okdp/packages-dev/vault
    tag: 0.1.1
    interval: 30m
    timeout: 10m
  parameters:
    dev: true
  contexts:
    - name: default
      namespace: kubocd-system
  targetNamespace: vault-system
  createNamespace: true
