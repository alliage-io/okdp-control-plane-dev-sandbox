apiVersion: v1alpha1
name: external-secrets
tag: 0.1.0
protected: true
description: |
  External Secrets Operator synchronizes secrets from external APIs (HashiCorp Vault, AWS Secrets Manager, etc.) into Kubernetes Secrets.
schema:
  parameters:
    properties:
      installCRDs: { type: boolean, default: true }
      webhook:
        properties:
          enabled: { type: boolean, default: true }
      certController:
        properties:
          enabled: { type: boolean, default: true }
modules:
  - name: main
    timeout: 10m
    source:
      helmRepository:
        url: https://charts.external-secrets.io
        chart: external-secrets
        version: "0.15.1"
    values: |
      installCRDs: {{ .Parameters.installCRDs }}
      webhook:
        create: {{ .Parameters.webhook.enabled }}
      certController:
        enabled: {{ .Parameters.certController.enabled }}
roles:
  - externalSecrets
dependencies: []
