apiVersion: v1alpha1
name: metrics-server
tag: 0.1.0
protected: true
description: |
  Kubernetes Metrics Server - Scalable, efficient source of container resource
  metrics. Feeds the horizontal pod autoscaler, kubectl top, and the OKDP
  Console Resource usage panels via the metrics.k8s.io aggregated API.
schema:
  parameters:
    properties:
      insecureKubeletTls:
        type: boolean
        default: true
        description: "Skip TLS verification of the kubelet certificate (required on kind / dev clusters with self-signed kubelet certs)"
      metricResolution:
        type: string
        default: "15s"
        description: "Scrape interval for container resource metrics"
modules:
  - name: main
    timeout: 5m
    source:
      helmRepository:
        url: https://kubernetes-sigs.github.io/metrics-server/
        chart: metrics-server
        version: "3.12.2"
    values: |
      defaultArgs:
        - --cert-dir=/tmp
        - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
        - --kubelet-use-node-status-port
        - --metric-resolution={{ .Parameters.metricResolution }}
      {{- if .Parameters.insecureKubeletTls }}
      args:
        - --kubelet-insecure-tls
      {{- end }}
roles: []
dependencies: []
