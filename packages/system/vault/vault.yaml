apiVersion: v1alpha1
name: vault
tag: 0.1.1
protected: true
schema:
  parameters:
    properties:
      dev: { type: boolean, default: true }
modules:
  - name: main
    timeout: 10m
    source:
      helmRepository:
        url: https://helm.releases.hashicorp.com
        chart: vault
        version: "0.29.1"
    values: |
      server:
        dev:
          enabled: {{ .Parameters.dev }}
        ingress:
          enabled: true
          ingressClassName: {{ .Context.ingress.className }}
          annotations:
            cert-manager.io/cluster-issuer: {{ .Context.certificateIssuer.public }}
          hosts:
            - host: vault.{{ .Context.ingress.suffix }}
              paths: []
          tls:
            - secretName: vault-tls
              hosts:
                - vault.{{ .Context.ingress.suffix }}
      ui:
        enabled: true
roles: []
dependencies: []
